<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kouper Health — Care Coordinator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Shell ─────────────────────────────────────────────────── */
    .shell {
      width: 100%;
      max-width: 720px;
      height: 100vh;
      max-height: 860px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      background: #1a56db;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    header .title { font-size: 16px; font-weight: 600; }
    header .subtitle { font-size: 12px; opacity: .75; margin-top: 1px; }

    /* ── Patient bar ───────────────────────────────────────────── */
    .patient-bar {
      background: #eef2ff;
      border-bottom: 1px solid #dde3f0;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .patient-bar label {
      font-size: 13px;
      color: #4b5563;
      font-weight: 500;
      white-space: nowrap;
    }

    .patient-bar input {
      width: 72px;
      padding: 5px 8px;
      border: 1px solid #c7d2fe;
      border-radius: 6px;
      font-size: 13px;
      color: #1e40af;
      font-weight: 600;
      outline: none;
    }

    .patient-bar input:focus { border-color: #1a56db; box-shadow: 0 0 0 2px #c7d2fe; }

    #session-badge {
      margin-left: auto;
      font-size: 11px;
      color: #9ca3af;
      font-family: monospace;
    }

    /* ── Messages ──────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .bubble-row.nurse   { flex-direction: row-reverse; }
    .bubble-row.assistant { flex-direction: row; }

    .bubble-row .icon {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .bubble-row.nurse .icon     { background: #1a56db; color: #fff; }
    .bubble-row.assistant .icon { background: #e5e7eb; color: #374151; }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble-row.nurse .bubble {
      background: #1a56db;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble-row.assistant .bubble {
      background: #f3f4f6;
      color: #111827;
      border-bottom-left-radius: 4px;
    }

    /* typing indicator */
    .typing .bubble {
      background: #f3f4f6;
      padding: 12px 16px;
    }

    .dots span {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #9ca3af;
      margin: 0 2px;
      animation: bounce .9s infinite;
    }

    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .30s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-5px); }
    }

    /* error bubble */
    .error-bubble {
      font-size: 13px;
      color: #b91c1c;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 8px 12px;
      align-self: center;
    }

    /* ── Input bar ─────────────────────────────────────────────── */
    .input-bar {
      border-top: 1px solid #e5e7eb;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      background: #fff;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      resize: none;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
    }

    #msg-input:focus { border-color: #1a56db; box-shadow: 0 0 0 2px #c7d2fe; }
    #msg-input:disabled { background: #f9fafb; }

    #send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #1a56db;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      align-self: flex-end;
      transition: background .15s;
    }

    #send-btn:hover:not(:disabled) { background: #1e40af; }
    #send-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    #send-btn svg { width: 18px; height: 18px; fill: #fff; }
  </style>
</head>
<body>

<div class="shell">

  <!-- Header -->
  <header>
    <div class="avatar">🏥</div>
    <div>
      <div class="title">Care Coordinator</div>
      <div class="subtitle">Kouper Health · Appointment Assistant</div>
    </div>
  </header>

  <!-- Patient selector -->
  <div class="patient-bar">
    <label for="patient-id-input">Patient ID</label>
    <input id="patient-id-input" type="number" min="1" value="1" />
    <span id="session-badge">No active session</span>
  </div>

  <!-- Message thread -->
  <div id="messages"></div>

  <!-- Input -->
  <div class="input-bar">
    <textarea
      id="msg-input"
      rows="1"
      placeholder="Type a message…"
      autocomplete="off"
    ></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  const API_BASE = "http://localhost:8000";

  const messagesEl   = document.getElementById("messages");
  const inputEl      = document.getElementById("msg-input");
  const sendBtn      = document.getElementById("send-btn");
  const patientInput = document.getElementById("patient-id-input");
  const sessionBadge = document.getElementById("session-badge");

  let sessionId = null;   // stored in memory for the lifetime of the page

  // ── Helpers ──────────────────────────────────────────────────────────────

  function appendBubble(role, text) {
    const row = document.createElement("div");
    row.className = `bubble-row ${role}`;

    const icon = document.createElement("div");
    icon.className = "icon";
    icon.textContent = role === "nurse" ? "👩‍⚕️" : "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    row.appendChild(icon);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function appendTyping() {
    const row = document.createElement("div");
    row.className = "bubble-row assistant typing";

    const icon = document.createElement("div");
    icon.className = "icon";
    icon.textContent = "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

    row.appendChild(icon);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendError(text) {
    const el = document.createElement("div");
    el.className = "error-bubble";
    el.textContent = "⚠ " + text;
    messagesEl.appendChild(el);
    scrollToBottom();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setLoading(isLoading) {
    inputEl.disabled  = isLoading;
    sendBtn.disabled  = isLoading;
  }

  function updateSessionBadge() {
    sessionBadge.textContent = sessionId
      ? `Session: ${sessionId.slice(0, 8)}…`
      : "No active session";
  }

  // ── Send ─────────────────────────────────────────────────────────────────

  async function send() {
    const message   = inputEl.value.trim();
    const patientId = parseInt(patientInput.value, 10);

    if (!message || isNaN(patientId)) return;

    inputEl.value = "";
    inputEl.style.height = "auto";

    appendBubble("nurse", message);
    setLoading(true);

    const typingRow = appendTyping();

    try {
      const body = { patient_id: patientId, message };
      if (sessionId) body.session_id = sessionId;

      const res = await fetch(`${API_BASE}/chat`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(body),
      });

      const data = await res.json();

      typingRow.remove();

      if (!res.ok) {
        appendError(data.detail ?? `Server error (${res.status})`);
        return;
      }

      // Store session ID returned by server
      if (data.session_id && !sessionId) {
        sessionId = data.session_id;
        updateSessionBadge();
      }

      appendBubble("assistant", data.reply);

    } catch (err) {
      typingRow.remove();
      appendError("Could not reach the server. Is the FastAPI app running?");
      console.error(err);
    } finally {
      setLoading(false);
      inputEl.focus();
    }
  }

  // ── Events ────────────────────────────────────────────────────────────────

  // Send on button click
  sendBtn.addEventListener("click", send);

  // Send on Enter (Shift+Enter for newline)
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // Auto-grow textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  // Reset session when patient ID changes
  patientInput.addEventListener("change", () => {
    sessionId = null;
    updateSessionBadge();
    messagesEl.innerHTML = "";
    appendBubble(
      "assistant",
      `Patient ID changed to ${patientInput.value}. Starting a new session.`
    );
  });

  // ── Initial greeting ──────────────────────────────────────────────────────
  appendBubble(
    "assistant",
    "Hello! I'm your Care Coordinator assistant. Tell me what you need — I can help find providers, check appointment types, look up availability, and book appointments."
  );

  inputEl.focus();
</script>
</body>
</html>
